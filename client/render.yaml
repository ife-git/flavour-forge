# client/render.yaml
staticSites:
  - type: static
    name: flavour-forge-frontend
    env: static
    region: frankfurt
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*.js
        value:
          Content-Type: application/javascript
      - path: /assets/*.css
        value:
          Content-Type: text/css
      - path: /*
        value:
          X-Content-Type-Options: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
